name: CI/CD Pipeline - Build and Deploy to EKS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:       us-east-2
  AWS_ACCOUNT_ID:   382458445256
  ECR_REPO_NAME:    pipeline
  ECR_REGISTRY:     382458445256.dkr.ecr.us-east-2.amazonaws.com
  IMAGE_NAME:       382458445256.dkr.ecr.us-east-2.amazonaws.com/pipeline
  EKS_CLUSTER_NAME: my-eks-cluster
  K8S_NAMESPACE:    default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ─── Checkout ───────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─── Java & Maven Setup ─────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ─── Build ──────────────────────────────────────────────────
      - name: Build JAR using Maven
        run: mvn clean package -DskipTests

      - name: Archive JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      # ─── Test ───────────────────────────────────────────────────
      - name: Run Unit Tests
        run: mvn test

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: target/surefire-reports/*.xml

      # ─── AWS Credentials ────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ─── Docker Build ───────────────────────────────────────────
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.run_number }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.run_number }} ${{ env.IMAGE_NAME }}:latest

      # ─── Push to ECR ────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPO_NAME }} \
            --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPO_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Push Image to ECR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.run_number }}
          docker push ${{ env.IMAGE_NAME }}:latest

      # ─── Update Kubeconfig ──────────────────────────────────────
      - name: Update Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}
          kubectl get nodes

      # ─── Deploy to EKS ──────────────────────────────────────────
      - name: Deploy to EKS
        run: |
          sed -i 's|IMAGE_PLACEHOLDER|${{ env.IMAGE_NAME }}:${{ github.run_number }}|g' \
            Deployment.yaml

          kubectl apply -f Deployment.yaml \
            --namespace=${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/pipeline \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=120s

          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          kubectl get svc pipeline-service -n ${{ env.K8S_NAMESPACE }}

      # ─── Cleanup ────────────────────────────────────────────────
      - name: Cleanup Docker Images
        if: always()
        run: |
          docker rmi ${{ env.IMAGE_NAME }}:${{ github.run_number }} || true
          docker rmi ${{ env.IMAGE_NAME }}:latest || true

      # ─── Notifications ──────────────────────────────────────────
      - name: Success Message
        if: success()
        run: |
          echo "Build #${{ github.run_number }} deployed to EKS successfully!"
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.run_number }}"

      - name: Failure Message
        if: failure()
        run: echo "Build #${{ github.run_number }} failed. Check the logs."
